# DE-GP-EI: scipy differential_evolution to maximize GP-EI (or GP mean).
# User-facing name in notebooks: DE-GP-EI (module: de_gp_ei_solver).
# default is merged first; then function_1..function_8 override.
# Used by de_gp_ei_solver.suggest() and function notebooks Section 6.

default:
  acquisition: "ei"   # "ei" (Expected Improvement) or "mean"
  xi: 0.01
  seed: 42
  popsize: 15
  maxiter: 100
  atol: 0.0
  tol: 1.0e-6

# Function 1: 2D Radiation
function_1:
  acquisition: "ei"
  xi: 0.01
  seed: 42
  popsize: 15
  maxiter: 100

# Function 2: 2D Mystery ML
function_2:
  acquisition: "ei"
  seed: 42

# Function 3–8: inherit default (optional overrides)
function_3: {}
function_4: {}
function_5: {}
function_6: {}
function_7: {}
function_8: {}
