# Optuna hyperparameters per challenge function (TPE, CMA-ES, random, GP sampler).
# Keys match suggest() kwargs. default is merged first; function_1..function_8 override.
# Explicit arguments to optuna_solver.suggest() (e.g. sampler="gp", seed) override this file — use that in Section 6 for side-by-side TPE vs GP.
# GPSampler needs Optuna >= 3.6 (see requirements-benchmark.txt). TPE uses multivariate mode in code.
# Used by optuna_solver.suggest(), all function notebooks (Section 6), and append_results/run_optimizers_on_data.py.

default:
  sampler: "tpe"
  n_startup_trials: 10
  seed: 42
  # TPE-only (ignored for cmaes/random/gp): number of candidate samples to compute EI
  n_ei_candidates: 24

# Function 1: 2D Radiation — small budget; fewer startup trials
function_1:
  sampler: "tpe"
  n_startup_trials: 8
  seed: 42

# Function 2: 2D Mystery ML
function_2:
  sampler: "tpe"
  n_startup_trials: 10
  seed: 42

# Function 3: 3D Drug discovery
function_3:
  sampler: "tpe"
  n_startup_trials: 10
  seed: 42

# Function 4: 4D Warehouse
function_4:
  sampler: "tpe"
  n_startup_trials: 12
  seed: 42

# Function 5: 4D Chemical yield
function_5:
  sampler: "tpe"
  n_startup_trials: 10
  seed: 42

# Function 6: 5D Recipe
function_6:
  sampler: "tpe"
  n_startup_trials: 12
  seed: 42

# Function 7: 6D Hyperparameter tuning
function_7:
  sampler: "tpe"
  n_startup_trials: 15
  seed: 42

# Function 8: 8D High-dimensional ML
function_8:
  sampler: "tpe"
  n_startup_trials: 20
  seed: 42
