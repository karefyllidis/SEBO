# Optuna (TPE / CMA-ES / random) hyperparameters per challenge function.
# Keys match suggest() kwargs. default is merged first; then function_1..function_8 override.
# Used by optuna_solver.suggest(), the Function 1 notebook (Section 6), and scripts/run_optimizers_on_data.py.

default:
  sampler: "tpe"
  n_startup_trials: 10
  seed: 42
  # TPE-only (ignored for cmaes/random): number of candidate samples to compute EI
  n_ei_candidates: 24

# Function 1: 2D Radiation — small budget; fewer startup trials
function_1:
  sampler: "tpe"
  n_startup_trials: 8
  seed: 42

