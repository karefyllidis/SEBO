# TuRBO (BoTorch) hyperparameters per challenge function.
# Keys match suggest() kwargs. default is merged first; then function_1..function_8 override.
# acqf: "ts" (Thompson sampling) or "ei" (Expected Improvement).
# Used by turbo_solver.suggest() and the Function 1 notebook (Section 6).

default:
  acqf: "ts"
  seed: 42
  num_restarts: 10
  raw_samples: 512
  n_candidates: null   # for TS: min(5000, max(2000, 200*d)); null = auto

